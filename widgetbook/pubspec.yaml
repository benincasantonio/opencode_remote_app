name: widgetbook_workspace
description: Widgetbook catalog for OpenCode Remote App widgets.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  widgetbook: ^3.22.0
  opencode_remote_app:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  widgetbook_annotation: ^3.11.0
  widgetbook_generator: ^3.22.0
  build_runner: ^2.12.2

flutter:
  uses-material-design: true
